name: CI/CD – Test, Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checka ut koden
        uses: actions/checkout@v4

      - name: Sätt upp Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installera beroenden
        run: npm ci

      - name: Kör enhetstester
        run: npm run test

  build:
    name: Build (Vite)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checka ut koden
        uses: actions/checkout@v4

      - name: Sätt upp Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installera beroenden
        run: npm ci

      - name: Bygg produktionsversion
        run: npm run build

      - name: Konfigurera GitHub Pages
        uses: actions/configure-pages@v4

      - name: Ladda upp dist/ som Pages-artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy → GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicera till GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4